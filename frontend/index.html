<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8faff;
  --surface:#ffffff;
  --surface2:#f1f5fd;
  --blue:#2563eb;
  --blue2:#3b82f6;
  --cyan:#0891b2;
  --violet:#7c3aed;
  --pink:#db2777;
  --green:#059669;
  --red:#dc2626;
  --orange:#f97316;
  --text:#0f172a;
  --text2:#475569;
  --text3:#94a3b8;
  --border:rgba(15,23,42,0.08);
  --border2:rgba(15,23,42,0.13);
  --glow:rgba(37,99,235,0.10);
}
html{scroll-behavior:smooth}
body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}
#cursor{position:fixed;width:10px;height:10px;background:var(--blue);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .2s,height .2s,background .2s;mix-blend-mode:multiply}
#cursor-ring{position:fixed;width:36px;height:36px;border:1.5px solid rgba(59,130,246,0.5);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .35s ease,height .35s ease,border-color .35s}
body:has(a:hover) #cursor,body:has(button:hover) #cursor{width:16px;height:16px;background:var(--cyan)}
body:has(a:hover) #cursor-ring,body:has(button:hover) #cursor-ring{width:52px;height:52px;border-color:rgba(6,182,212,0.6)}
.grid-overlay{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(15,23,42,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(15,23,42,0.04) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse 80% 60% at 50% 40%,black,transparent)}

/* NAV */
nav{
  position:sticky;top:0;left:0;right:0;z-index:100;
  height:60px;display:flex;align-items:center;
  justify-content:space-between;padding:0 40px;
  background:rgba(248,250,255,0.85);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.logo{font-size:1rem;font-weight:700;letter-spacing:-0.02em;display:flex;align-items:center;gap:8px;color:var(--text);cursor:pointer}
.logo-icon{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--blue),var(--violet));display:flex;align-items:center;justify-content:center;font-size:14px}
.nav-tabs{display:flex;gap:4px;list-style:none;opacity:0;transition:opacity .3s}
.nav-tabs.visible{opacity:1}
.nav-tab{
  font-size:0.83rem;font-weight:500;color:var(--text2);
  text-decoration:none;padding:6px 14px;border-radius:8px;
  transition:all .18s;cursor:pointer;border:none;background:none;font-family:inherit;
}
.nav-tab:hover{color:var(--text);background:rgba(255,255,255,0.05)}
.nav-tab.active{color:var(--blue);background:rgba(37,99,235,0.10)}
.nav-right{display:flex;gap:10px;align-items:center}
.btn-ghost{font-size:0.83rem;font-weight:500;color:var(--text2);background:none;border:none;cursor:pointer;padding:6px 14px;border-radius:8px;transition:color .18s;font-family:inherit}
.btn-ghost:hover{color:var(--text)}
.btn-primary{font-size:0.83rem;font-weight:600;color:#fff;background:var(--blue);border:none;cursor:pointer;padding:8px 18px;border-radius:8px;font-family:inherit;transition:all .18s;position:relative;overflow:hidden}
.btn-primary::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,rgba(255,255,255,0.12),transparent)}
.btn-primary:hover{background:#2563eb;transform:translateY(-1px);box-shadow:0 4px 20px rgba(59,130,246,0.4)}

/* MAIN CONTAINER */
.container{position:relative;z-index:1;min-height:calc(100vh - 60px);padding:40px}

/* TAB CONTENT */
.page-content{display:none;animation:fadeIn .4s ease}
.page-content.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ── HERO PAGE ── */
.hero{

  align-items:center;justify-content:center;
  padding:0px 24px 60px;text-align:center;
}

.ticker-wrap{

.hero-title{

@keyframes gradShift{0%,100%{background-position:0%}50%{background-position:100%}}

.typewriter-wrap{

.tw-static{color:var(--text2);white-space:nowrap}
.tw-dynamic{

.tw-cursor{

}

.search-wrap{
  width:100%;max-width:660px;margin-bottom:18px;
  opacity:0;animation:fadeUp .65s .42s ease forwards;
  position:relative;
}
.search-glow{
  position:absolute;inset:-1px;border-radius:17px;
  background:linear-gradient(90deg,var(--blue),var(--cyan),var(--violet));
  opacity:0;transition:opacity .3s;border-radius:17px;z-index:-1;
  filter:blur(8px);
}
.search-wrap:focus-within .search-glow{opacity:0.6}
.search-bar{
  display:flex;align-items:center;
  background:white;
  border:1.5px solid var(--border2);

}
.search-wrap:focus-within .search-bar{border-color:rgba(59,130,246,0.5)}
.search-bar input{
  flex:1;border:none;outline:none;background:transparent;
  font-family:'Inter',sans-serif;font-size:0.93rem;color:var(--text);
  cursor:none;
}
.search-bar input::placeholder{color:var(--text3)}
.search-divider{width:1px;height:22px;background:var(--border2);flex-shrink:0}
.search-brand{
  font-size:0.8rem;font-weight:600;color:var(--text2);
  white-space:nowrap;font-family:'JetBrains Mono',monospace;
}
.search-btn{
  width:44px;height:44px;border-radius:12px;
  background:linear-gradient(135deg,var(--blue),var(--cyan));
  border:none;cursor:pointer;display:flex;
  align-items:center;justify-content:center;flex-shrink:0;
  transition:transform .18s,box-shadow .18s;
  box-shadow:0 2px 12px rgba(59,130,246,0.35);
}
.search-btn:hover{transform:scale(1.08);box-shadow:0 4px 20px rgba(59,130,246,0.5)}
.search-btn svg{width:17px;height:17px;color:#fff}

.quick-actions{
  display:flex;flex-wrap:wrap;gap:8px;justify-content:center;
  max-width:680px;margin-bottom:56px;
  opacity:0;animation:fadeUp .65s .5s ease forwards;
}
.qa-btn{
  display:flex;align-items:center;gap:7px;
  padding:8px 16px;border-radius:10px;
  background:white;
  border:1px solid var(--border);
  font-family:'Inter',sans-serif;font-size:0.83rem;
  font-weight:500;color:var(--text2);cursor:pointer;
  transition:all .2s;
  box-shadow:0 1px 4px rgba(15,23,42,0.05);
}
.qa-btn:hover{
  border-color:rgba(59,130,246,0.35);
  color:var(--text);background:rgba(59,130,246,0.08);
  transform:translateY(-2px);

}

.stats-row{
  display:flex;gap:40px;align-items:center;

}
.stat-item{text-align:center}
.stat-num{
  font-size:1.6rem;font-weight:800;
  letter-spacing:-0.04em;color:var(--text);
  font-variant-numeric:tabular-nums;
}
.stat-label{font-size:0.73rem;color:var(--text3);font-weight:400;margin-top:2px}
.stat-div{width:1px;height:36px;background:var(--border2)}

/* ── DASHBOARD PAGE ── */
.dashboard-container{max-width:1400px;margin:0 auto}

.page-title{

}
.page-desc{
  font-size:0.95rem;color:var(--text2);max-width:500px;margin-bottom:30px;
}

<script>
// ══════════════════════════════════════════════

const API_BASE = "https://deploytual.onrender.com";

// ── CURSOR ──
let uploadedFileId = "";
let uploadedFileName = "";
let uploadedRows = [];
let uploadedColumns = [];
let numericColumns = [];
let currentChatId = null;
let currentTableRows = [];
let sortColumn = "";
let sortAscending = true;
let chatHistory = migrateChatHistory(JSON.parse(localStorage.getItem("chatHistory")) || []);

const cur=document.getElementById('cursor');
const ring=document.getElementById('cursor-ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cur.style.left=mx+'px';cur.style.top=my+'px'});
(function animRing(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(animRing)})();

window.addEventListener("beforeunload", () => {});
window.addEventListener("unload", () => {});

// ── PAGE NAVIGATION ──
function showPage(pageName){
  document.querySelectorAll('.page-content').forEach(page=>page.classList.remove('active'));
  const page=document.getElementById(pageName);
  if(page) page.classList.add('active');
  const navTabs=document.querySelectorAll('.nav-tab');
  navTabs.forEach(tab=>tab.classList.remove('active'));
  const activeTab=document.querySelector(`[data-page="${pageName}"]`);
  if(activeTab) activeTab.classList.add('active');
  const navTabsContainer=document.getElementById('nav-tabs');
  const navRightBtn=document.getElementById('nav-right-btn');
  const navCta=document.getElementById('nav-cta');
  if(pageName==='home'){
    navTabsContainer.classList.remove('visible');
    navRightBtn.textContent='Sign in';
    navRightBtn.onclick=null;
    navRightBtn.style.cursor='pointer';
    navCta.style.display='block';
    navCta.textContent='Get started free →';
  } else {
    navTabsContainer.classList.add('visible');
    navRightBtn.textContent='Back Home';
    navRightBtn.onclick=()=>showPage('home');
    navRightBtn.style.cursor='pointer';
    navCta.style.display='none';
  }
  if(pageName === "dashboard") loadConnectedTables();
  if(pageName === "history") renderHistory();
  window.scrollTo(0,0);
}

// ── TYPEWRITER ──
const words=['plain English','your language','natural words','any question','simple terms'];
let wi=0,ci=0,deleting=false,pause=0;
const tw=document.getElementById('tw-text');
function typeStep(){
  const word=words[wi];
  if(!deleting){
    ci++;tw.textContent=word.slice(0,ci);
    if(ci===word.length){deleting=true;pause=60}
  } else {
    if(pause-->0){setTimeout(typeStep,30);return}
    ci--;tw.textContent=word.slice(0,ci);
    if(ci===0){deleting=false;wi=(wi+1)%words.length}
  }
  setTimeout(typeStep,deleting?40:80);
}
setTimeout(typeStep,1200);

// ── LIVE TICKER ──
const tickerEl=document.getElementById('ticker-val');
let tickVal=1284;
setInterval(()=>{
  tickVal+=Math.floor(Math.random()*8)+1;
  tickerEl.textContent=tickVal.toLocaleString();
},2800);

// ── COUNT-UP STATS ──
function countUp(el,target,suffix,dur){
  const start=performance.now();
  const fmt=n=>{
    if(target>=1000000000)return(n/1000000000).toFixed(1)+'B';
    if(target>=1000)return Math.floor(n/1000).toLocaleString()+'K+';
    return n.toFixed(1)+suffix;
  };
  function step(now){
    const t=Math.min((now-start)/dur,1);
    const ease=1-Math.pow(1-t,3);
    el.textContent=fmt(target*ease);
    if(t<1)requestAnimationFrame(step);
    else el.textContent=fmt(target);
  }
  requestAnimationFrame(step);
}
setTimeout(()=>{
  countUp(document.getElementById('stat1'),50000,'',2000);
  countUp(document.getElementById('stat2'),2100000000,'',2200);
  countUp(document.getElementById('stat3'),99.9,'%',1800);
},600);

// ── MARQUEE ──
const integrations=[...]; // all integrations from original code
const track=document.getElementById('marquee');
const doubled=[...integrations,...integrations];
doubled.forEach(([emoji,name])=>{
  const el=document.createElement('div');
  el.className='marquee-item';
  el.innerHTML=`<span>${emoji}</span>${name}`;
  track.appendChild(el);
});
